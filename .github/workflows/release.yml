name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, such as v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Publish release
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ inputs.tag }}"
          fi
          case "$tag" in
            v*) ;;
            *)
              echo "Release tag must start with v, got: $tag" >&2
              exit 2
              ;;
          esac
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Show tool versions
        run: |
          python3 --version
          gh --version

      - name: Compile Python
        run: python3 -m py_compile pr-tui

      - name: Run unit tests
        run: python3 -m unittest discover -s tests

      - name: Check CLI help
        run: ./pr-tui --help

      - name: Smoke test curses startup
        run: python3 tests/smoke_curses.py

      - name: Check installer syntax
        run: sh -n install.sh

      - name: Build release assets
        run: |
          mkdir -p dist
          install -m 0755 pr-tui dist/pr-tui
          install -m 0755 install.sh dist/install.sh
          shasum -a 256 dist/pr-tui dist/install.sh > dist/checksums.txt

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/pr-tui dist/install.sh dist/checksums.txt --clobber
          else
            gh release create "$RELEASE_TAG" dist/pr-tui dist/install.sh dist/checksums.txt \
              --title "$RELEASE_TAG" \
              --generate-notes
          fi
